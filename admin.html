<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>STOCK WAR - MASTER PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body{ font-family:'Pretendard'; background-color:#020617; color:#f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-10 antialiased overflow-x-hidden">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h1 class="text-6xl font-black italic text-emerald-500 tracking-tighter">MASTER PANEL</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest mt-2">현재 라운드: <span id="master-round-num" class="text-white mono">ROUND -</span></p>
        </div>
        <div class="flex gap-4">
            <button onclick="nextRound()" class="bg-emerald-500 text-[#020617] px-8 py-4 rounded-2xl font-black text-lg shadow-[0_0_25px_rgba(52,211,153,0.2)] active:scale-95 transition-all">다음 라운드 활성화 🚀</button>
            <button onclick="globalReset()" class="bg-red-900/30 text-red-500 border border-red-500/20 px-6 py-4 rounded-2xl font-bold text-xs">전체 리셋</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 glass rounded-[3rem] overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em]">
                    <tr><th class="p-8">순위</th><th>노드명</th><th>총 자산</th><th>투자 상태</th><th>매니지먼트</th></tr>
                </thead>
                <tbody id="rank-list"></tbody>
            </table>
        </div>

        <div class="glass rounded-[3rem] p-8">
            <h2 class="text-xl font-black mb-6 text-amber-500 italic">🔐 라운드별 보안코드</h2>
            <div id="pw-display" class="space-y-2 opacity-50 text-[10px]">
                </div>
        </div>
    </div>

    <script>
        const cfg = { apiKey: "AIzaSyBJ-Z1E9oCtf-4lXZ4kXNB7g2wDpzQRp20", databaseURL: "https://stock-war-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "stock-war" };
        firebase.initializeApp(cfg); const db = firebase.database();
        let currentRound = 1;

        db.ref('game_settings/currentRound').on('value', snap => {
            currentRound = snap.val() || 1;
            document.getElementById('master-round-num').innerText = "ROUND " + currentRound;
        });

        db.ref('rankings').on('value', (snap) => {
            const data = snap.val(); if(!data) { document.getElementById('rank-list').innerHTML = ""; return; }
            const sorted = Object.entries(data).sort((a,b)=>b[1].assets - a[1].assets);
            document.getElementById('rank-list').innerHTML = sorted.map(([name, info], i) => {
                // 사용자가 정산 코드를 입력해서 '다음 라운드 대기' 상태인 경우 투명하게 표시
                const isWaiting = info.isWaiting === true;
                const isLocked = info.isLocked === true;

                return `
                <tr class="border-t border-white/5 ${isWaiting ? 'opacity-30' : 'opacity-100'} transition-opacity">
                    <td class="p-8 font-black text-4xl text-slate-700 italic mono">${i+1}</td>
                    <td class="text-xl font-bold">${name}</td>
                    <td class="text-2xl font-black text-emerald-400 mono">₩ ${info.assets.toLocaleString()}</td>
                    <td class="py-4">
                        <span class="${isWaiting ? 'text-amber-500' : (isLocked ? 'text-emerald-500' : 'text-red-500 animate-pulse')} font-black text-[10px] uppercase tracking-widest">
                            ${isWaiting ? '[정산완료-대기]' : (isLocked ? '[확정완료]' : '[입력중...]')}
                        </span>
                    </td>
                    <td class="pr-8">
                        <div class="flex gap-1">
                            <button onclick="setLock('${name}', false)" class="bg-amber-900/30 text-amber-500 p-2 rounded-lg text-[9px] font-black border border-amber-500/20">수정허용</button>
                            <button onclick="addCoin('${name}', 1)" class="bg-white/5 p-2 rounded-lg text-[9px] font-black">+1🪙</button>
                            <button onclick="editBal('${name}', ${info.assets})" class="bg-white/5 p-2 rounded-lg text-[9px] font-black">수정</button>
                            <button onclick="kick('${name}')" class="bg-red-900/20 text-red-500 p-2 rounded-lg text-[9px] font-black">추방</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        });

        function setLock(name, status) { db.ref('rankings/' + name).update({ isLocked: status, isWaiting: false }); }
        function nextRound() { if(confirm(`ROUND ${currentRound+1}을 활성화할까요?`)) db.ref('game_settings').update({ currentRound: currentRound + 1 }); }
        function addCoin(n, a) { db.ref('rankings/'+n+'/coins').transaction(c => (c||0)+a); }
        function kick(n) { if(confirm(`${n} 팀을 추방할까요?`)) db.ref('rankings/'+n).remove(); }
        function globalReset() { if(confirm("전체 초기화합니다.")) { db.ref('rankings').remove(); db.ref('game_settings').update({ currentRound: 1 }); } }
        function editBal(n, c) { const v = prompt(`${n} 팀 자산 수정`, c); if(v) db.ref('rankings/'+n).update({ assets: parseInt(v) }); }
    </script>
</body>
</html>
