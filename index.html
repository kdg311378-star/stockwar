        function sync() {
            localStorage.setItem('sw_final_v10', JSON.stringify(state));
            updateUI();
            if (db && state.name) db.ref('rankings/' + state.name).update({ assets: state.assets, round: state.round, coins: state.coins, isLocked: state.isLocked, ts: Date.now() });
        }

        function startGame() {
            const n = document.getElementById('user-name').value;
            if(!n && !state.name) return alert("팀명을 입력하세요!");
            if(!state.name) state.name = n;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            if(db) {
                db.ref('game_settings/currentRound').on('value', snap => { globalRound = snap.val() || 1; updateUI(); });
                
                // 내 데이터 감시
                db.ref('rankings/' + state.name).on('value', snap => {
                    if(!snap.exists() && state.name !== "") { localStorage.removeItem('sw_final_v10'); location.reload(); }
                    if(snap.exists()) { const d = snap.val(); state.coins = d.coins || 0; state.assets = d.assets || state.assets; updateUI(); }
                });

                // ★ 전원 확정 감시 로직 ★
                db.ref('rankings').on('value', snap => {
                    const allData = snap.val();
                    if(!allData) return;
                    const players = Object.values(allData);
                    const currentRoundPlayers = players.filter(p => p.round === state.round);
                    const totalCount = currentRoundPlayers.length;
                    const lockedCount = currentRoundPlayers.filter(p => p.isLocked === true).length;

                    const setBtn = document.getElementById('settle-btn');
                    const statusText = document.querySelector('#settlement-section h3');

                    if (totalCount > 0 && lockedCount < totalCount) {
                        setBtn.disabled = true;
                        setBtn.innerText = `대기 (${lockedCount}/${totalCount} 확정)`;
                        setBtn.className = "w-full bg-slate-800 text-slate-500 py-4 rounded-2xl font-black text-sm uppercase";
                        statusText.innerText = "다른 참가자의 확정을 기다리는 중...";
                    } else {
                        setBtn.disabled = false;
                        setBtn.innerText = "정산하기";
                        setBtn.className = "w-full bg-emerald-500 text-[#020617] py-4 rounded-2xl font-black text-sm uppercase shadow-lg shadow-emerald-500/20";
                        statusText.innerText = "전원 확정! 보안코드를 입력하세요.";
                    }
                });
            }
            renderCompanies(); sync();
        }

        function renderCompanies() {

                    <div class="flex-1 flex items-center bg-white/5 rounded-xl px-4 border border-white/5 focus-within:border-emerald-500/50">
                        <input type="number" oninput="updateInv('${id}', this.value)" ${state.isLocked?'disabled':''} 
                               value="${(state.investments[id]||0)/10000}" class="w-full bg-transparent text-right font-black mono text-slate-100 py-3 outline-none text-sm" placeholder="0">
                        <span class="text-slate-400 font-bold text-[10px] ml-2">만</span>
                    </div>

            `).join('');
            const btn = document.getElementById('lock-btn');

            }
            const infoBox = document.getElementById('info-section');
            const rData = state.purchased[state.round] || {};

                infoBox.classList.remove('hidden');

            } else { infoBox.classList.add('hidden'); }
        }

        function updateInv(id, val) { state.investments[id] = (parseInt(val)||0) * 10000; localStorage.setItem('sw_final_v10', JSON.stringify(state)); }
        
        function lockInvestment() {
            let total = Object.values(state.investments).reduce((a,b)=>a+b, 0);
            if(total > state.assets) return alert("자산 부족!");
            if(total <= 0) return alert("투자금을 설정하세요!");
            if(!confirm("포지션을 확정하시겠습니까? 전원이 확정해야 정산이 가능합니다.")) return;
            state.isLocked = true; sync(); renderCompanies();
        }

        function processSettlement() {
            if(state.round > globalRound) return alert("진행자의 정산 승인을 기다려주세요.");
            const key = document.getElementById('round-key').value;
            const rData = scenario['round' + state.round];
            if(!rData || key !== rData.key) return alert("코드 불일치!");
            let inv = 0; let prof = 0;
            Object.entries(state.investments).forEach(([id, val]) => { inv += val; prof += val * (rData.rates[id] || 1); });
            state.assets = Math.floor((state.assets - inv) + prof);
            state.round++; state.isLocked = false; state.investments = { BAUL:0, SOLOMAN:0, DAWITH:0, AMAJOSEPH:0, CHANEL:0, LUKEBIO:0, SAMSON:0 };
            document.getElementById('round-key').value = ""; alert("정산 완료!"); sync(); renderCompanies();
        }

            document.getElementById('display-assets').innerText = state.assets.toLocaleString();
            document.getElementById('display-coins').innerText = state.coins;
            document.getElementById('display-round').innerText = "ROUND " + state.round;
            document.getElementById('display-name').innerText = `Node: ${state.name}`;

            if(state.round > globalRound) { setBtn.innerText = "진행 대기 중"; setBtn.disabled = true; setBtn.className = "w-full bg-white/5 text-slate-600 py-4 rounded-2xl font-black text-xs"; }
        }

        function handleScan(text) { const id = text.trim().toUpperCase(); if (Object.keys(state.purchased[state.round] || {}).length > 0) return alert("이미 정보를 획득했습니다."); if (!companyInfo[id]) return alert("무효!"); scanId = id; document.getElementById('modal-company-name').innerText = companyInfo[id].name; document.getElementById('purchase-modal').classList.remove('hidden'); }
        function buyInfo(tier) { if(state.coins < tier) return alert("코인 부족!"); state.coins -= tier; if(!state.purchased[state.round]) state.purchased[state.round] = {}; state.purchased[state.round][scanId] = tier; closeModal(); sync(); renderCompanies(); }
        function closeModal() { document.getElementById('purchase-modal').classList.add('hidden'); }
        let sc = null; function openScanner() { document.getElementById('qr-modal').classList.remove('hidden'); sc = new Html5Qrcode("reader"); sc.start({ facingMode: "environment" }, { fps: 15, qrbox: 220 }, (txt) => { closeScanner(); handleScan(txt); }).catch(() => closeScanner()); }
        function closeScanner() { if(sc) sc.stop().then(()=>document.getElementById('qr-modal').classList.add('hidden')); }
