            round6: { key: "1234", rates: { BAUL: 0.65, SOLOMAN: 0.15, DAWITH: 1.10, AMAJOSEPH: 1.30, CHANEL: 1.60, LUKEBIO: 0.45, SAMSON: 1.95 } },
            round7: { key: "9900", rates: { BAUL: 1.55, SOLOMAN: 1.85, DAWITH: 0.75, AMAJOSEPH: 1.20, CHANEL: 0.60, LUKEBIO: 0.90, SAMSON: 1.05 } },
            round8: { key: "4444", rates: { BAUL: 0.15, SOLOMAN: 0.20, DAWITH: 1.15, AMAJOSEPH: 0.25, CHANEL: 0.40, LUKEBIO: 1.10, SAMSON: 0.50 } },
            round9: { key: "2026", rates: { BAUL: 1.05, SOLOMAN: 1.05, DAWITH: 1.00, AMAJOSEPH: 1.15, CHANEL: 1.05, LUKEBIO: 1.10, SAMSON: 1.10 } }
        };

        const companyIds = ["BAUL", "SOLOMAN", "DAWITH", "AMAJOSEPH", "CHANEL", "LUKEBIO", "SAMSON"];
        const initialState = { 
            name: "", round: 1, assets: 10000000, coins: 0, 
            investments: { BAUL:0, SOLOMAN:0, DAWITH:0, AMAJOSEPH:0, CHANEL:0, LUKEBIO:0, SAMSON:0 }, 
            isLocked: false, isWaiting: false, nextAssets: 0, isJoined: false, purchased: {} 
        };
        
        let state = JSON.parse(localStorage.getItem('sw_v12_final')) || {...initialState};
        let globalRound = 1;
        let scanId = "";

        function sync() {
            localStorage.setItem('sw_v12_final', JSON.stringify(state));
            updateUI();
            if (db && state.name) db.ref('rankings/' + state.name).update({ 
                assets: state.assets, round: state.round, coins: state.coins, 
                isLocked: state.isLocked, isWaiting: state.isWaiting, ts: Date.now() 
            });
        }

        function startGame() {
            if(!state.name) state.name = document.getElementById('user-name').value;
            if(!state.name) return alert("팀명 입력!");
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            if(db) {
                db.ref('game_settings/currentRound').on('value', snap => { 
                    const newGlobal = snap.val() || 1;
                    if (newGlobal < globalRound && state.isJoined) { state = {...initialState, name: state.name}; sync(); }
                    if (newGlobal > globalRound && state.isWaiting) {
                        state.assets = state.nextAssets; state.round = newGlobal; state.isWaiting = false; state.isLocked = false;
                        state.investments = { BAUL:0, SOLOMAN:0, DAWITH:0, AMAJOSEPH:0, CHANEL:0, LUKEBIO:0, SAMSON:0 };
                        // 라운드 변경 시 구매 정보 초기화
                        state.purchased = {}; 
                        sync(); alert("새 라운드가 시작되었습니다!");
                    }
                    globalRound = newGlobal; renderCompanies(); updateUI(); 
                });

                db.ref('rankings/' + state.name).on('value', snap => {
                    if(!snap.exists() && state.isJoined) { 
                        alert("리셋 또는 추방되었습니다."); localStorage.removeItem('sw_v12_final'); location.reload(); return; 
                    }
                    const d = snap.val();
                    if(d) {
                        state.isLocked = d.isLocked || false; state.isWaiting = d.isWaiting || false;
                        state.assets = d.assets || state.assets; state.coins = d.coins || 0;
                        state.isJoined = true; renderCompanies(); updateUI();
                    } else if (!state.isJoined) { state.isJoined = true; sync(); }
                });
            }
        }

        function renderCompanies() {
            const list = document.getElementById('company-list');
            const inputDisabled = state.isLocked || state.isWaiting;
            list.innerHTML = companyIds.map(id => `
                <div class="flex items-center gap-3 ${inputDisabled ? 'opacity-60' : ''}">
                    <span class="w-16 font-black text-slate-500 text-[11px] uppercase">${companyInfo[id].name}</span>
                    <div class="flex-1 flex items-center bg-white/5 rounded-xl px-4 border ${inputDisabled ? 'border-white/5' : 'border-emerald-500/50'}">
                        <input type="number" oninput="updateInv('${id}', this.value)" ${inputDisabled ? 'disabled' : ''} value="${(state.investments[id]||0)/10000}" class="w-full bg-transparent text-right font-black mono text-slate-100 py-3 outline-none text-sm">
                        <span class="text-slate-400 font-bold text-[10px] ml-2">만</span>
                    </div>
                </div>`).join('');
            
            const btn = document.getElementById('lock-btn');
            if(inputDisabled) {
                btn.innerText = state.isWaiting ? "정산 완료 (대기 중)" : "포지션 확정 상태";
                btn.className = "w-full mt-6 bg-slate-800 text-slate-500 py-4 rounded-2xl font-black text-[10px]";
                btn.disabled = true;
                if(!state.isWaiting) document.getElementById('settlement-section').classList.remove('hidden');
                else document.getElementById('settlement-section').classList.add('hidden');
            } else {
                btn.innerText = "투자 포지션 확정"; btn.className = "w-full mt-6 bg-white text-[#020617] py-4 rounded-2xl font-black text-[10px] shadow-xl";
                btn.disabled = false; document.getElementById('settlement-section').classList.add('hidden');
            }
            document.getElementById('settle-inputs').classList.toggle('hidden', state.isWaiting);
            document.getElementById('waiting-msg').classList.toggle('hidden', !state.isWaiting);

            // 기밀 정보 브리핑 섹션 갱신
            const infoBox = document.getElementById('info-section');
            if(Object.keys(state.purchased).length > 0) {
                infoBox.classList.remove('hidden');
                document.getElementById('info-content').innerHTML = Object.entries(state.purchased).map(([id, tier]) => 
                    `<div><span class="bg-amber-400 text-black px-2 py-0.5 rounded text-[8px] mr-2 font-black">T${tier} ${companyInfo[id].name}</span> ${companyInfo[id]['r'+globalRound]['t'+tier]}</div>`
                ).join('');
            } else { infoBox.classList.add('hidden'); }
        }

        // QR 및 구매 관련 함수
        function openScanner() { document.getElementById('qr-modal').classList.remove('hidden'); sc = new Html5Qrcode("reader"); sc.start({ facingMode: "environment" }, { fps: 15, qrbox: 220 }, (txt) => { closeScanner(); handleScan(txt); }).catch(() => closeScanner()); }
        function closeScanner() { if(sc) sc.stop().then(()=>document.getElementById('qr-modal').classList.add('hidden')); }
        function handleScan(text) { 
            const id = text.trim().toUpperCase(); 
            if (!companyInfo[id]) return alert("유효하지 않은 데이터 노드입니다."); 
            if (state.purchased[id]) return alert("이미 이 기업의 정보를 확보했습니다.");
            scanId = id; 
            document.getElementById('modal-company-name').innerText = companyInfo[id].name; 
            document.getElementById('purchase-modal').classList.remove('hidden'); 
        }
        function buyInfo(tier) { 
            if(state.coins < tier) return alert("코인이 부족합니다!"); 
            state.coins -= tier; 
            state.purchased[scanId] = tier; 
            closeModal(); sync(); renderCompanies(); 
        }
        function closeModal() { document.getElementById('purchase-modal').classList.add('hidden'); }

        function updateInv(id, val) { state.investments[id] = (parseInt(val)||0) * 10000; localStorage.setItem('sw_v12_final', JSON.stringify(state)); }
        function lockInvestment() { 
            let total = Object.values(state.investments).reduce((a,b)=>a+b, 0);
            if(total > state.assets) return alert("자산 부족!");
            if(total <= 0) return alert("투자금을 입력하세요!");
            state.isLocked = true; sync(); 
        }
        function processSettlement() {
            const key = document.getElementById('round-key').value;
            const rData = scenario['round' + globalRound];
            if(!rData || key !== rData.key) return alert("코드 불일치!");
            let inv = 0; let prof = 0;
            Object.entries(state.investments).forEach(([id, val]) => { inv += val; prof += val * (rData.rates[id] || 1); });
            state.nextAssets = Math.floor((state.assets - inv) + prof);
            state.isWaiting = true; sync();
        }

        function updateUI() {
            document.getElementById('display-assets').innerText = state.assets.toLocaleString();
            document.getElementById('display-round').innerText = "ROUND " + globalRound;
            document.getElementById('display-name').innerText = `Node: ${state.name}`;
            document.getElementById('display-coins').innerText = state.coins;
        }

        let sc = null;
        let db = null; try { const cfg = { apiKey: "AIzaSyBJ-Z1E9oCtf-4lXZ4kXNB7g2wDpzQRp20", databaseURL: "https://stock-war-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "stock-war" }; firebase.initializeApp(cfg); db = firebase.database(); } catch(e){}
        if(state.name) startGame();
    </script>
</body>
</html>
